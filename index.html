<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pull String Light Bulb</title>

<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#222;
    flex-direction:column;
    font-family:Arial;
}

.bulb{
    width:120px;
    transition:0.3s;
}

.rope{
    width:4px;
    height:120px;
    background:white;
    margin-top:-10px;
    cursor:pointer;
    transition:0.2s;
}

.rope:active{
    transform:translateY(40px);
}

.text{
    color:white;
    margin-top:20px;
}
</style>

</head>

<body>

<img id="bulb" class="bulb" src="https://www.w3schools.com/js/pic_bulbon.gif">

<div class="rope" onclick="toggleLight()"></div>

<div class="text">Pull the string</div>

<script>
let bulb = document.getElementById("bulb");
let state = true;

function toggleLight(){

if(state){
bulb.src = "https://www.w3schools.com/js/pic_bulboff.gif";
}else{
bulb.src = "https://www.w3schools.com/js/pic_bulbon.gif";
}

state = !state;

}
</script>

</body>
</html>
