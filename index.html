<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Dorcas ❤️</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    height: 100vh;
    background: radial-gradient(circle at top, #1b2735, #090a0f);
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    color: #fff;
  }

  .container {
    z-index: 2;
    padding: 20px;
  }

  h1 {
    font-size: 2.4rem;
    line-height: 1.4;
    color: #ffb6c1;
    text-shadow: 0 0 15px rgba(255, 182, 193, 0.8);
    animation: glowIn 3s ease forwards;
  }

  @keyframes glowIn {
    0% {
      opacity: 0;
      transform: scale(0.8);
    }
    100% {
      opacity: 1;
      transform: scale(1);
    }
  }

  .heart {
    position: absolute;
    bottom: -10vh;
    color: rgba(255, 105, 180, 0.9);
    animation: floatUp linear forwards;
    text-shadow: 0 0 10px rgba(255, 105, 180, 0.8);
  }

  @keyframes floatUp {
    from {
      transform: translateY(0) scale(0.6);
      opacity: 1;
    }
    to {
      transform: translateY(-120vh) scale(1.3);
      opacity: 0;
    }
  }

  .tap {
    margin-top: 25px;
    font-size: 0.95rem;
    color: #ccc;
    opacity: 0.8;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
</style>
</head>

<body>

<div class="container">
  <h1>
    I love you<br>
    ❤️ Dorcas Kutimwa ❤️
  </h1>
  <div class="tap">Tap anywhere to play music 🎶</div>
</div>

<!-- Background Music -->
<audio id="music" loop>
  <source src="dandelion.mp3" type="audio/mpeg">
</audio>

<script>
  function createHeart() {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.innerHTML = '❤️';
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.fontSize = Math.random() * 18 + 14 + 'px';
    heart.style.animationDuration = Math.random() * 3 + 5 + 's';

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 8000);
  }

  setInterval(createHeart, 350);

  // Play music on first interaction (mobile-safe)
  document.body.addEventListener('click', () => {
    document.getElementById('music').play();
  }, { once: true });
</script>

</body>

</html>
