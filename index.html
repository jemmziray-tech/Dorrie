<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Shop</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

header{
background:#222;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
padding:30px;
}

.card{
background:white;
width:220px;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

img{
width:100%;
border-radius:10px;
}

button{
margin-top:10px;
padding:10px;
border:none;
background:green;
color:white;
border-radius:5px;
cursor:pointer;
}

.cart{
position:fixed;
bottom:20px;
right:20px;
background:#222;
color:white;
padding:15px;
border-radius:10px;
}

</style>
</head>

<body>

<header>
<h2>My Online Shop</h2>
<div>Cart: <span id="count">0</span></div>
</header>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Nike Shoes</h3>
<p>$50</p>
<button onclick="addCart('Nike Shoes')">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Headphones</h3>
<p>$30</p>
<button onclick="addCart('Headphones')">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Smart Watch</h3>
<p>$70</p>
<button onclick="addCart('Smart Watch')">Add to Cart</button>
</div>

</div>

<div class="cart">
<button onclick="checkout()">Checkout</button>
</div>

<script>

let cart=[]
let phone="255743924467"

function addCart(product){

cart.push(product)

document.getElementById("count").innerText=cart.length

}

function checkout(){

let message="Hello, I want to order:\n"

cart.forEach(item=>{
message+= "- "+item+"\n"
})

let url="https://wa.me/"+phone+"?text="+encodeURIComponent(message)

window.open(url,"_blank")

}

</script>

</body>
</html>
