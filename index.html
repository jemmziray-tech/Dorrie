<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Mini Shop</title>
<style>
body{font-family:Arial;background:#f2f2f2;margin:0;}
header{background:#222;color:white;padding:15px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;}
.search-bar input, .filter-bar select{padding:7px;margin:5px;border-radius:5px;border:none;}
.products{display:flex;flex-wrap:wrap;justify-content:center;gap:25px;padding:20px;transition:0.3s;}
.card{background:white;width:220px;padding:15px;border-radius:10px;text-align:center;box-shadow:0 5px 10px rgba(0,0,0,0.1);transition:0.3s;}
.card:hover{transform:translateY(-5px);box-shadow:0 10px 20px rgba(0,0,0,0.2);}
img{width:100%;border-radius:10px;transition:0.3s;}
button{margin-top:10px;padding:10px;border:none;background:green;color:white;border-radius:5px;cursor:pointer;transition:0.2s;}
button:hover{background:#0a8f3c;}
.cart{position:fixed;bottom:20px;right:20px;background:white;padding:15px;border-radius:10px;box-shadow:0 5px 10px rgba(0,0,0,0.2);width:300px;transition:0.3s;}
.cart h4{margin-top:0;}
.cart ul{padding-left:20px;}
.remove{background:red;margin-left:5px;}
.cart-total{margin-top:10px;font-weight:bold;}
.quantity{width:40px;margin-left:5px;text-align:center;}
@media(max-width:600px){.products{flex-direction:column;align-items:center;}}
</style>
</head>
<body>

<header>
<h2>Ultimate Mini Shop</h2>
<div class="search-bar">
<input type="text" id="search" placeholder="Search products..." onkeyup="filterProducts()">
</div>
<div class="filter-bar">
<select id="categoryFilter" onchange="filterProducts()">
<option value="all">All Categories</option>
</select>
<input type="number" id="minPrice" placeholder="Min Price" oninput="filterProducts()">
<input type="number" id="maxPrice" placeholder="Max Price" oninput="filterProducts()">
</div>
<div>Cart: <span id="count">0</span></div>
</header>

<div class="products" id="productContainer"></div>

<div class="cart" id="cartBox">
<h4>Your Cart</h4>
<ul id="cartItems"></ul>
<div class="cart-total">Total: $<span id="total">0</span></div>
<button onclick="checkout()">Checkout</button>
<button onclick="clearCart()" style="background:red;margin-top:5px;">Clear Cart</button>
</div>

<script>
// Load products from localStorage
let products = JSON.parse(localStorage.getItem("products")) || []
let cart=[]
let phone="255743924467"

// Populate category filter
let categories = ["all", ...new Set(products.map(p=>p.category))]
let select = document.getElementById("categoryFilter")
categories.forEach(c=>{
let opt=document.createElement("option")
opt.value=c
opt.text=c.charAt(0).toUpperCase()+c.slice(1)
select.appendChild(opt)
})

// Display products
function displayProducts(list=products){
let container=""
list.forEach((p,index)=>{
container+=`
<div class="card">
<img src="${p.image}" alt="${p.name}">
<h3>${p.name}</h3>
<p>$${p.price}</p>
<p><em>${p.category}</em></p>
<button onclick="addCart(${index}, this)">Add to Cart</button>
</div>`
})
document.getElementById("productContainer").innerHTML=container
}

// Add to cart + quantity + animation
function addCart(index, btn){
let product = products[index]
let existing = cart.find(item=>item.name===product.name)
if(existing){ existing.quantity +=1 } 
else { cart.push({name:product.name, price:product.price, quantity:1}) }

updateCart()

btn.innerText="Added!"
btn.style.transform="scale(1.2)"
setTimeout(()=>{btn.innerText="Add to Cart"; btn.style.transform="scale(1)"},500)
let img = btn.parentElement.querySelector("img")
img.style.transform="scale(1.05)"
setTimeout(()=>{img.style.transform="scale(1)"},300)
}

// Remove item
function removeItem(index){ cart.splice(index,1); updateCart() }

// Clear cart
function clearCart(){ cart=[]; updateCart() }

// Update cart display
function updateCart(){
document.getElementById("count").innerText=cart.length
let list=""
let total=0
cart.forEach((item,index)=>{
total+=Number(item.price)*item.quantity
list+=`<li>${item.name} - $${item.price} x 
<input type="number" class="quantity" value="${item.quantity}" min="1" onchange="changeQuantity(${index},this.value)"> 
<button class="remove" onclick="removeItem(${index})">X</button></li>`
})
document.getElementById("cartItems").innerHTML=list
document.getElementById("total").innerText=total

// Cart animation
let cartBox = document.getElementById("cartBox")
cartBox.style.transform="scale(1.05)"
setTimeout(()=>{cartBox.style.transform="scale(1)"},200)
}

// Change quantity
function changeQuantity(index,value){
let qty = parseInt(value)
if(qty<1) qty=1
cart[index].quantity=qty
updateCart()
}

// WhatsApp checkout
function checkout(){
if(cart.length===0) return alert("Cart is empty")
let message="Hello, I want to order:\n"
cart.forEach(item=>{message+="- "+item.name+" ($"+item.price+") x "+item.quantity+"\n"})
let url="https://wa.me/"+phone+"?text="+encodeURIComponent(message)
window.open(url,"_blank")
}

// Search + filter
function filterProducts(){
let query = document.getElementById("search").value.toLowerCase()
let cat = document.getElementById("categoryFilter").value
let min = parseFloat(document.getElementById("minPrice").value) || 0
let max = parseFloat(document.getElementById("maxPrice").value) || Infinity
let filtered = products.filter(p=>{
let matchesQuery=p.name.toLowerCase().includes(query)
let matchesCat = (cat==="all")? true : p.category===cat
let matchesPrice = p.price>=min && p.price<=max
return matchesQuery && matchesCat && matchesPrice
})
displayProducts(filtered)
}

displayProducts()
</script>

</body>
</html>
