<!DOCTYPE html>
<html>
<head>
<title>Electric Circuit Simulation</title>

<style>

body{
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
font-family:Arial;
color:white;
}

h2{
margin-bottom:20px;
}

.circuit{
position:relative;
width:500px;
height:250px;
border:4px solid #38bdf8;
border-radius:20px;
}

.battery{
position:absolute;
left:-40px;
top:90px;
width:40px;
height:80px;
background:#ef4444;
border-radius:5px;
}

.bulb{
position:absolute;
right:-20px;
top:95px;
width:40px;
height:40px;
background:#555;
border-radius:50%;
transition:0.3s;
}

.bulb.on{
background:yellow;
box-shadow:0 0 40px yellow;
}

.switch{
margin-top:30px;
padding:12px 25px;
background:#38bdf8;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

.electron{
position:absolute;
width:10px;
height:10px;
background:#22c55e;
border-radius:50%;
animation:flow 4s linear infinite;
opacity:0;
}

@keyframes flow{
0%{left:0;top:120px;}
25%{left:240px;top:0;}
50%{left:480px;top:120px;}
75%{left:240px;top:240px;}
100%{left:0;top:120px;}
}

</style>
</head>

<body>

<h2>Electric Circuit Simulation ⚡</h2>

<div class="circuit">

<div class="battery"></div>

<div class="bulb" id="bulb"></div>

<div class="electron" id="e1"></div>
<div class="electron" id="e2" style="animation-delay:1s"></div>
<div class="electron" id="e3" style="animation-delay:2s"></div>

</div>

<button class="switch" onclick="toggleCircuit()">Toggle Switch</button>

<script>

let on=false;

function toggleCircuit(){

let bulb=document.getElementById("bulb");
let electrons=document.querySelectorAll(".electron");

on=!on;

if(on){
bulb.classList.add("on");

electrons.forEach(e=>{
e.style.opacity=1;
});

}else{

bulb.classList.remove("on");

electrons.forEach(e=>{
e.style.opacity=0;
});

}

}

</script>

</body>
</html>
